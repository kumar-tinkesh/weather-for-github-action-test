wname: Update Feature Documentation

on:
  push:
    branches: [master]

# Only one docs update runs at a time — others queue behind it
concurrency:
  group: docs-update
  cancel-in-progress: false

jobs:
  update-docs:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      # 1. Get info about the merged PR that triggered this push
      - name: Get merged PR details
        id: merged-pr
        uses: actions/github-script@v7
        with:
          script: |
            const commits = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            const merged = commits.data.find(pr => pr.merged_at && pr.base.ref === 'master');
            if (!merged) {
              core.setOutput('skip', 'true');
              core.info('No merged PR found for this push — skipping.');
              return;
            }
            core.setOutput('skip', 'false');
            core.setOutput('pr_number', merged.number);
            core.setOutput('pr_url', merged.html_url);
            core.setOutput('pr_title', merged.title);
            core.setOutput('branch_name', merged.head.ref);

      - name: Exit if no merged PR
        if: steps.merged-pr.outputs.skip == 'true'
        run: echo "No merged PR — nothing to do." && exit 0

      # 2. Checkout the repo
      - name: Checkout repository
        if: steps.merged-pr.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 3. Set up Ruby (needed for map-files-to-features.rb)
      - name: Set up Ruby
        if: steps.merged-pr.outputs.skip != 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      # 4. Detect changed files and map to features
      - name: Detect affected features
        if: steps.merged-pr.outputs.skip != 'true'
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.merged-pr.outputs.pr_number }}"

          CHANGED_FILES=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}/files" \
            --paginate --jq '.[].filename')

          echo "Changed files:"
          echo "$CHANGED_FILES"

          JSON_RESULT=$(echo "$CHANGED_FILES" | ruby .github/scripts/map-files-to-features.rb --stdin --json)

          echo "Detection result:"
          echo "$JSON_RESULT"

          FEATURES=$(echo "$JSON_RESULT" | ruby -rjson -e 'puts JSON.parse(STDIN.read)["affected_features"].join("\n")')
          NEW_FEATURES=$(echo "$JSON_RESULT" | ruby -rjson -e '
            suggestions = JSON.parse(STDIN.read)["new_feature_suggestions"]
            puts suggestions.map { |s| JSON.generate(s) }.join("\n") if suggestions.any?
          ')

          HAS_EXISTING="false"
          HAS_NEW="false"

          if [ -n "$FEATURES" ]; then
            HAS_EXISTING="true"
            echo "Affected features:"
            echo "$FEATURES"
          fi

          if [ -n "$NEW_FEATURES" ]; then
            HAS_NEW="true"
            echo "New feature suggestions:"
            echo "$NEW_FEATURES"
          fi

          if [ "$HAS_EXISTING" = "false" ] && [ "$HAS_NEW" = "false" ]; then
            echo "No feature docs affected and no new features detected."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          FILE_COUNT=$(echo "$CHANGED_FILES" | grep -c -v '^$' || true)
          NEEDS_SEMANTIC="false"
          if [ "$FILE_COUNT" -ge 5 ] && [ "$HAS_NEW" = "false" ]; then
            NEEDS_SEMANTIC="true"
            echo "Large PR ($FILE_COUNT files) with no auto-detected new features — will run semantic check"
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "has_existing=$HAS_EXISTING" >> "$GITHUB_OUTPUT"
          echo "has_new=$HAS_NEW" >> "$GITHUB_OUTPUT"
          echo "needs_semantic=$NEEDS_SEMANTIC" >> "$GITHUB_OUTPUT"

          echo "features<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FEATURES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "new_features_json<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NEW_FEATURES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "changed_files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGED_FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Exit if nothing to do
        if: steps.detect.outputs.skip == 'true'
        run: echo "No docs to update." && exit 0

      # 5. Create or reuse the documentation branch
      - name: Create or reuse documentation branch
        if: steps.detect.outputs.skip != 'true'
        id: branch
        run: |
          BRANCH_NAME="documentation/${{ steps.merged-pr.outputs.branch_name }}"
          echo "branch=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

          if git ls-remote --heads origin "$BRANCH_NAME" | grep -q .; then
            echo "Branch '$BRANCH_NAME' exists on remote — reusing it."
            git fetch origin "$BRANCH_NAME"
            git checkout -b "$BRANCH_NAME" origin/"$BRANCH_NAME"
            git reset --hard origin/master
            echo "reused=true" >> "$GITHUB_OUTPUT"
          else
            echo "Creating new branch '$BRANCH_NAME'."
            git checkout -b "$BRANCH_NAME"
            echo "reused=false" >> "$GITHUB_OUTPUT"
          fi

      # 6. Build the prompt for Claude Code
      - name: Build Claude Code prompt
        if: steps.detect.outputs.skip != 'true'
        id: prompt
        run: |
          FEATURES="${{ steps.detect.outputs.features }}"
          NEW_FEATURES_JSON="${{ steps.detect.outputs.new_features_json }}"
          HAS_EXISTING="${{ steps.detect.outputs.has_existing }}"
          HAS_NEW="${{ steps.detect.outputs.has_new }}"
          NEEDS_SEMANTIC="${{ steps.detect.outputs.needs_semantic }}"
          CHANGED_FILES="${{ steps.detect.outputs.changed_files }}"
          CHANGED_FILE_LIST=$(echo "$CHANGED_FILES" | sed 's/^/  - /')

          cat <<'PROMPT_HEADER' > /tmp/claude-prompt.txt
          You are updating feature documentation for the Skutally Rails app.
          A PR was just merged. Read docs/features/catalog.md for context.

          Namespace mapping:
          - Features starting with "pos/" -> docs/features/pos/<name>.md
          - Features starting with "apis/" -> docs/features/apis/<name>.md
          - "landing-pages" or "platform-infrastructure" -> docs/features/<name>.md
          - All others -> docs/features/backoffice/<name>.md
          PROMPT_HEADER

          # Part 1: Existing feature updates
          if [ "$HAS_EXISTING" = "true" ]; then
            FEATURE_LIST=$(echo "$FEATURES" | sed 's/^/  - /')
            cat <<EXISTING_EOF >> /tmp/claude-prompt.txt

          ## Part 1: Update existing feature docs

          These feature docs need updating based on changed files:

          ${FEATURE_LIST}

          For each affected feature:
          1. Read the feature's entry in docs/features/catalog.md to find its key paths
          2. Read the existing doc file in docs/features/ (check the namespace)
          3. Read the changed source files to understand what changed
          4. Update ONLY the sections of the doc affected by the code changes
          5. Update the "Last Updated" timestamp to today's datetime in ISO 8601 format (YYYY-MM-DDTHH:MM:SSZ)
          6. Use verbatim code from the codebase — never simplify or paraphrase
          EXISTING_EOF
          fi

          # Part 2: Auto-detected new features
          if [ "$HAS_NEW" = "true" ]; then
            cat <<'NEW_HEADER' >> /tmp/claude-prompt.txt

          ## Part 2: New feature detected — create catalog entry and documentation

          The mapping script detected files that don't belong to any existing feature
          and appear to form a new feature. For each suggestion below:

          1. **Verify it's genuinely new** — Read the files listed. Confirm they represent
             a distinct feature, not just additions to an existing feature. If they belong
             to an existing feature, update that feature's YAML mapping in catalog.md instead.

          2. **If it IS a new feature:**
             a. Add a new entry to docs/features/catalog.md in the Features section
             b. Add file patterns to the Feature-to-Path Mapping YAML block in catalog.md
             c. Determine the correct namespace (backoffice for most, pos/ for POS, apis/ for API)
             d. Generate the feature doc following .claude/prompts/templates/feature.template.md
             e. Update docs/README.md to add the new feature row

          3. **If it belongs to an existing feature:**
             a. Add the unmapped file patterns to the existing feature's YAML mapping in catalog.md
             b. Update the existing feature doc if the new files change its behavior

          New feature suggestions:
          NEW_HEADER

            echo "$NEW_FEATURES_JSON" | while IFS= read -r line; do
              [ -z "$line" ] && continue
              SLUG=$(echo "$line" | ruby -rjson -e 'puts JSON.parse(STDIN.read)["suggested_slug"]')
              FILES=$(echo "$line" | ruby -rjson -e 'JSON.parse(STDIN.read)["files"].each { |f| puts "    - #{f}" }')
              LAYERS=$(echo "$line" | ruby -rjson -e 'puts JSON.parse(STDIN.read)["layers"].join(", ")')
              cat <<SUGGESTION_EOF >> /tmp/claude-prompt.txt

          ### Suggested: \`${SLUG}\`
          - Layers: ${LAYERS}
          - Files:
          ${FILES}
          SUGGESTION_EOF
            done
          fi

          # Part 3: Semantic new-feature check
          if [ "$NEEDS_SEMANTIC" = "true" ]; then
            cat <<SEMANTIC_EOF >> /tmp/claude-prompt.txt

          ## Part 3: Semantic new-feature check

          This is a large PR where all files mapped to existing features, but a new
          feature could be hidden inside existing directories. Review the changed files
          and assess whether they introduce a new capability.

          Changed files in this PR:

          ${CHANGED_FILE_LIST}

          **Quick check — answer these three questions:**
          1. Do the changes introduce a new user-facing capability (new screens, new API
             endpoints, new workflow) that didn't exist before?
          2. Is this capability distinct enough that a user would think of it as a separate
             feature? (e.g., "Returns" vs "Sales Orders")
          3. Would documenting it inside the existing feature doc make that doc bloated?

          **If YES to all three:**
          - Add a new entry to docs/features/catalog.md (entry + YAML mapping)
          - Generate the feature doc following .claude/prompts/templates/feature.template.md
          - Update docs/README.md with the new row

          **If NO:** Skip this — just update existing feature docs from Part 1.
          SEMANTIC_EOF
          fi

          # Part 4: Explicit per-feature customer-facing doc generation
          cat <<'PART4_HEADER' >> /tmp/claude-prompt.txt

          ## Part 4: Generate customer-facing docs for EVERY updated feature

          IMPORTANT: This part is MANDATORY. For every feature doc you updated or created
          in Parts 1-3, you MUST also generate the corresponding customer-facing docs below.
          Do NOT skip this part.

          For each feature, read the template, then generate the output file.
          If the output file already exists, update only the sections affected by the changes.
          If it does not exist, generate it from scratch using the template.

          Here are the exact files to generate:
          PART4_HEADER

          # Build explicit per-feature output paths
          echo "$FEATURES" | while IFS= read -r feature; do
            [ -z "$feature" ] && continue

            if [[ "$feature" == pos/* ]]; then
              NAMESPACE="pos"
              SLUG="${feature#pos/}"
            elif [[ "$feature" == apis/* ]]; then
              NAMESPACE="apis"
              SLUG="${feature#apis/}"
            else
              NAMESPACE="backoffice"
              SLUG="$feature"
            fi

            cat <<FEATURE_PATHS >> /tmp/claude-prompt.txt

          ### Feature: \`${feature}\` (namespace: ${NAMESPACE})
          - Source technical doc: docs/features/${NAMESPACE}/${SLUG}.md
          - **Knowledge Base**: Read .claude/prompts/templates/knowledge-base.template.md, then generate docs/knowledge-base/${NAMESPACE}/${SLUG}.md
            - Zero technical content: no code, schema, file paths, model names
            - Customer-friendly language only
          FEATURE_PATHS

            if [ "$NAMESPACE" != "apis" ]; then
              cat <<MANUAL_PATH >> /tmp/claude-prompt.txt
          - **User Manual**: Read .claude/prompts/templates/user-manual.template.md, then generate docs/user-manuals/${NAMESPACE}/${SLUG}.md
            - Read ERB view templates to extract exact button labels, form fields, nav paths
            - Step-by-step UI instructions for operators/staff
          MANUAL_PATH
            fi

            if [ "$NAMESPACE" = "apis" ]; then
              cat <<API_PATH >> /tmp/claude-prompt.txt
          - **API Reference**: Read .claude/prompts/templates/api-doc.template.md, then generate docs/api-docs/${SLUG}.md
            - Read GraphQL schema/types or REST routes for accurate endpoint docs
          API_PATH
            fi
          done

          cat <<'PROMPT_FOOTER' >> /tmp/claude-prompt.txt

          ## Rules
          - Only modify .md files in docs/ (catalog.md, README.md, feature docs, knowledge-base, user-manuals, api-docs)
          - Use verbatim code from the codebase in technical docs — never simplify or paraphrase
          - Customer-facing docs (KB, manuals, API) must contain zero code or internal details
          - Follow the appropriate template for each doc type
          - Create parent directories (mkdir -p) if they don't exist before writing files
          PROMPT_FOOTER

          echo "prompt<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/claude-prompt.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      # 7. Install and run Claude Code CLI
      - name: Install Claude Code CLI
        if: steps.detect.outputs.skip != 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code
        id: claude
        if: steps.detect.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set +e
          OUTPUT=$(claude -p "${{ steps.prompt.outputs.prompt }}" \
            --dangerously-skip-permissions \
            --allowedTools "Read,Glob,Grep,Edit,Write,Bash(git diff*),Bash(git log*),Bash(mkdir*)" 2>&1)
          EXIT_CODE=$?
          set -e

          if echo "$OUTPUT" | grep -q "API usage limits\|invalid_request_error\|API Error: 4"; then
            echo "::warning::Claude Code API limit reached — skipping doc generation."
            echo "::warning::Error: $OUTPUT"
            echo "api_limited=true" >> "$GITHUB_OUTPUT"
          elif [ $EXIT_CODE -ne 0 ]; then
            echo "::warning::Claude Code exited with code $EXIT_CODE — continuing with any partial changes."
            echo "::warning::Error: $OUTPUT"
            echo "api_limited=false" >> "$GITHUB_OUTPUT"
          else
            echo "$OUTPUT"
            echo "api_limited=false" >> "$GITHUB_OUTPUT"
          fi

      # 8. Commit and push
      - name: Commit and push changes
        if: steps.detect.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for dir in docs/features docs/knowledge-base docs/user-manuals docs/api-docs; do
            [ -d "$dir" ] && git add "$dir"
          done
          [ -f docs/README.md ] && git add docs/README.md
          if git diff --cached --quiet; then
            echo "No documentation changes to commit."
            echo "no_changes=true" >> "$GITHUB_ENV"
            exit 0
          fi

          git commit -m "$(cat <<EOF
          docs: update documentation for PR #${{ steps.merged-pr.outputs.pr_number }}

          Triggered by: ${{ steps.merged-pr.outputs.pr_title }}

          Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>
          EOF
          )"

          if [ "${{ steps.branch.outputs.reused }}" = "true" ]; then
            git push --force-with-lease origin "${{ steps.branch.outputs.branch }}"
          else
            git push origin "${{ steps.branch.outputs.branch }}"
          fi

      # 9. Create or update the documentation PR
      - name: Create or update documentation PR
        if: steps.detect.outputs.skip != 'true' && env.no_changes != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.branch.outputs.branch }}"
          FEATURES="${{ steps.detect.outputs.features }}"
          FEATURE_LIST=$(echo "$FEATURES" | sed 's/^/- `/' | sed 's/$/`/')
          PR_NUMBER="${{ steps.merged-pr.outputs.pr_number }}"
          PR_TITLE="${{ steps.merged-pr.outputs.pr_title }}"
          PR_URL="${{ steps.merged-pr.outputs.pr_url }}"

          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING_PR" ]; then
            echo "Open PR #${EXISTING_PR} exists — appending trigger info."

            CURRENT_BODY=$(gh pr view "$EXISTING_PR" --json body --jq '.body')

            UPDATED_BODY="${CURRENT_BODY}

          ---

          ### Also triggered by PR #${PR_NUMBER}

          Merged PR: #${PR_NUMBER} - ${PR_TITLE}
          Link: ${PR_URL}

          Additional updated features:

          ${FEATURE_LIST}"

            gh pr edit "$EXISTING_PR" --body "$UPDATED_BODY"
            echo "Updated PR #${EXISTING_PR}"
          else
            echo "No existing PR — creating new one."

            PR_BODY="## Documentation Update

          Triggered by: ${PR_URL}
          Merged PR: #${PR_NUMBER} - ${PR_TITLE}

          ### Updated feature docs

          ${FEATURE_LIST}

          ---
          Generated with [Claude Code](https://claude.com/claude-code)"

            gh pr create \
              --base master \
              --head "$BRANCH" \
              --title "docs: update docs for #${PR_NUMBER}" \
              --body "$PR_BODY"
          fi
