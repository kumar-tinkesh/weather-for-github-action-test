name: Feature and Test

on:
  push:
    branches: [main, master, 'feature/*']
  pull_request:
    branches: [main, master]

# Default permissions for the workflow
permissions:
  contents: read

jobs:
  lint-and-format:
    name: Lint and Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          pip install flake8 black isort

      - name: Check code formatting with Black
        run: |
          black --check --diff weather.py || true

      - name: Check import sorting with isort
        run: |
          isort --check-only --diff weather.py || true

      - name: Lint with flake8
        run: |
          flake8 weather.py --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 weather.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  test-cli:
    name: Test CLI Functionality
    runs-on: ubuntu-latest
    needs: lint-and-format

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Test Python syntax
        run: |
          python -m py_compile weather.py
          echo "✓ Python syntax is valid"

      - name: Test CLI help/usage (no args)
        run: |
          # Test that the script runs without error (will prompt for input, so we send EOF)
          echo "" | python weather.py || true

      - name: Test weather fetch (London)
        run: |
          python weather.py London
        timeout-minutes: 2

      - name: Test weather fetch (New York)
        run: |
          python weather.py "New York"
        timeout-minutes: 2

      - name: Test weather fetch (Tokyo)
        run: |
          python weather.py Tokyo
        timeout-minutes: 2

  test-multiple-python-versions:
    name: Test Python Compatibility
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Verify Python version
        run: |
          python --version

      - name: Test syntax compilation
        run: |
          python -m py_compile weather.py

      - name: Test CLI execution
        run: |
          python weather.py London
        timeout-minutes: 2

  feature-validation:
    name: Feature Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate PR title
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          echo "PR Title: $PR_TITLE"

          # Check for conventional commit format
          if [[ ! "$PR_TITLE" =~ ^(feat|fix|docs|style|refactor|test|chore)(\(.+\))?!?:\ .+ ]]; then
            echo "⚠️ Warning: PR title does not follow conventional commit format"
            echo "Expected format: type(scope)?: description"
            echo "Examples:"
            echo "  feat: add temperature unit conversion"
            echo "  fix: handle API timeout error"
            echo "  docs: update README with examples"
          else
            echo "✓ PR title follows conventional commit format"
          fi

      - name: Check code changes
        run: |
          echo "Changed files:"
          git diff --name-only HEAD^ HEAD

          # Check if weather.py was modified
          if git diff --name-only HEAD^ HEAD | grep -q "weather.py"; then
            echo "✓ weather.py was modified"
            echo "weather_changed=true" >> $GITHUB_ENV
          fi

      - name: Validate no breaking changes
        if: env.weather_changed == 'true'
        run: |
          echo "Checking for potential breaking changes..."

          # Test that the script still accepts command-line arguments
          python3 weather.py --help 2>/dev/null || python3 -c "import weather" || echo "Warning: Potential issue with CLI arguments"

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          WEATHER_CHANGED: ${{ env.weather_changed }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment => {
              return comment.user.type === 'Bot' && comment.body.includes('Feature Validation Results');
            });

            const weatherChanged = process.env.WEATHER_CHANGED || 'false';
            const changeWarning = weatherChanged === 'true'
              ? '⚠️ weather.py was modified - documentation may need updating'
              : 'No code changes detected';

            const output = `### Feature Validation Results

            ✅ Lint and Format Check
            ✅ CLI Functionality Tests
            ✅ Python Compatibility (3.8-3.12)

            ${changeWarning}

            ---
            *Automated validation complete*`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: output
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: output
              });
            }
